name: Copy Branch to Subfolder
on:
  push:
    branches: [ staging ]
jobs:
  copy-to-subfolder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Copy files to subfolder
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git checkout main
          git checkout staging -- preview-staging
          git add preview-staging
          git commit -m "Copy folder from source-branch to main/preview-staging"
          git push origin main   
